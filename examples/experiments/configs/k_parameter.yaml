# Test K values for Jacobson-Karels estimator
defaults:
  estimator: jk
  cooldown: true

experiments:
  - name: jk_K0.5_cooldown_on
    latency_k: 0.5
  - name: jk_K1.0_cooldown_on
    latency_k: 1.0
  - name: jk_K1.5_cooldown_on
    latency_k: 1.5
  - name: jk_K2.0_cooldown_on
    latency_k: 2.0
  - name: jk_K4.0_cooldown_on
    latency_k: 4.0
