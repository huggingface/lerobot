# Duplicate observations -- multiple windows with gaps
name: dup_obs_multiple

# Hardware
robot_type: so101
gpu: RTX 4070 TI SUPER
client_host: local server
server_host: local server

# Policy
policy_type: smolvla
pretrained_name_or_path: jackvial/so101_smolvla_pickplaceorangecube_e100

# DRTC parameters
estimator: jk
cooldown: true
latency_k: 1.5
epsilon: 1
s_min: 20
latency_alpha: 0.125
latency_beta: 0.25

# Flow matching / RTC
num_flow_matching_steps: 8
rtc_enabled: true
rtc_sigma_d: 0.2
rtc_prefix_attention_schedule: linear

# Timing
duration_s: 25.0
fps: 60
actions_per_chunk: 50

# Butterworth filter
action_filter_mode: butterworth
action_filter_butterworth_cutoff: 3.0
action_filter_gain: 1.4

# Diagnostics
full_diagnostics: false

# Fault injection
dup_obs:
  - {start_s: 3.0, duration_s: 2.0}
  - {start_s: 6.0, duration_s: 1.0}
  - {start_s: 10.0, duration_s: 1.0}
  - {start_s: 14.0, duration_s: 3.0}
  - {start_s: 20.0, duration_s: 1.0}
  - {start_s: 23.0, duration_s: 1.0}
