# Mixture of faults -- drops, duplicates, reordering, and disconnect combined
name: reorder_obs_and_actions

# Hardware
robot_type: so101
gpu: RTX 4070 TI SUPER
client_host: local server
server_host: local server

# Policy
policy_type: smolvla
pretrained_name_or_path: /home/jack/code/self-driving-screwdriver-robot/wandb_downloads/so101_smolvla_pickplaceorangecube_e100_20260108_203916/100000/pretrained_model/

# DRTC parameters
estimator: jk
cooldown: true
latency_k: 1.5
latency_warmup_n: 3
latency_seed_s: 0.15
epsilon: 1
s_min: 15
latency_alpha: 0.125
latency_beta: 0.25

# Timing
duration_s: 25.0
fps: 60
actions_per_chunk: 50

# Butterworth filter
action_filter_mode: butterworth
action_filter_butterworth_cutoff: 3.0
action_filter_gain: 1.4

# Fault injection
reorder_obs:
  - {start_s: 10.0, duration_s: 5.0}
reorder_action:
  - {start_s: 12, duration_s: 5.0}
