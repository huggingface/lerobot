# Compare estimators under spike conditions
defaults:
  # Hardware
  robot_type: so101
  gpu: RTX 4070 TI SUPER
  client_host: local server
  server_host: local server

  # Policy
  policy_type: smolvla
  pretrained_name_or_path: jackvial/so101_smolvla_pickplaceorangecube_e100

  # DRTC parameters
  cooldown: true
  latency_k: 2.0
  epsilon: 2
  s_min: 20
  latency_alpha: 0.125
  latency_beta: 0.25
  
  # Flow matching / RTC
  num_flow_matching_steps: 8
  rtc_enabled: true
  rtc_sigma_d: 0.2
  rtc_prefix_attention_schedule: linear

  # Timing
  duration_s: 25.0
  fps: 60
  actions_per_chunk: 50

  # Butterworth filter
  action_filter_mode: butterworth
  action_filter_butterworth_cutoff: 3.0
  action_filter_gain: 1.4

  # Diagnostics
  full_diagnostics: false

experiments:
  - name: spikes_max_last_10
    estimator: max_last_10
    spikes:
      - {start_s: 5.0, delay_ms: 500}
      - {start_s: 15.0, delay_ms: 1000}
