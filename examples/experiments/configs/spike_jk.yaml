# Compare estimators under spike conditions
defaults:
  # Hardware
  robot_type: so101
  gpu: RTX 4070 TI SUPER
  client_host: local server
  server_host: local server

  # Policy
  policy_type: smolvla
  pretrained_name_or_path: /home/jack/code/self-driving-screwdriver-robot/wandb_downloads/so101_smolvla_pickplaceorangecube_e100_20260108_203916/100000/pretrained_model/

  # Latency-adaptive parameters
  cooldown: true
  latency_k: 2.0
  epsilon: 2
  s_min: 15
  latency_alpha: 0.125
  latency_beta: 0.25

  # Timing
  duration_s: 30.0
  fps: 60
  actions_per_chunk: 50

  # Butterworth filter
  action_filter_mode: butterworth
  action_filter_butterworth_cutoff: 3.0
  action_filter_gain: 1.4

experiments:
  - name: spikes_jk
    estimator: jk
    spikes:
      - {start_s: 5.0, delay_ms: 2000}
      - {start_s: 15.0, delay_ms: 2000}
