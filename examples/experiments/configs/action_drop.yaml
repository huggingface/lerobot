# Action drop scenarios
defaults:
  estimator: jk
  cooldown: true

experiments:
  - name: jk_no_action_drops
  - name: jk_action_drop_at_5s
    drop_action:
      - {start_s: 5.0, duration_s: 1.0}
  - name: jk_action_drops_at_5s_and_15s
    drop_action:
      - {start_s: 5.0, duration_s: 1.0}
      - {start_s: 15.0, duration_s: 1.0}
