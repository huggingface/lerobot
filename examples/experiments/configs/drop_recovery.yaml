# Compare drop recovery with/without cooldown
defaults:
  estimator: jk

experiments:
  - name: cooldown_drop_at_10s
    cooldown: true
    drop_obs:
      - {start_s: 10.0, duration_s: 1.0}
  - name: no_cooldown_drop_at_10s
    cooldown: false
    drop_obs:
      - {start_s: 10.0, duration_s: 1.0}
