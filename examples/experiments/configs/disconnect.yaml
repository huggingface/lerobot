# Network disconnect -- system recovers after full outage
defaults:
  estimator: jk
  duration_s: 30.0

experiments:
  - name: drtc_disconnect_at_5s
    cooldown: true
    disconnect:
      - {start_s: 5.0, duration_s: 3.0}
  - name: baseline_disconnect_at_5s
    cooldown: false
    disconnect:
      - {start_s: 5.0, duration_s: 3.0}
