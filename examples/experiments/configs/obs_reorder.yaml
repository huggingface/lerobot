# Observation reorder injection -- LWW absorbs reordering
defaults:
  estimator: jk
  duration_s: 30.0

experiments:
  - name: drtc_obs_reorder_at_5s
    cooldown: true
    reorder_obs:
      - {start_s: 5.0, duration_s: 2.0}
  - name: baseline_obs_reorder_at_5s
    cooldown: false
    reorder_obs:
      - {start_s: 5.0, duration_s: 2.0}
