# Combined duplicate + reorder stress test
defaults:
  estimator: jk
  duration_s: 30.0

experiments:
  - name: drtc_dup_reorder_combined
    cooldown: true
    dup_obs:
      - {start_s: 5.0, duration_s: 2.0}
    dup_action:
      - {start_s: 8.0, duration_s: 2.0}
    reorder_obs:
      - {start_s: 12.0, duration_s: 2.0}
    reorder_action:
      - {start_s: 15.0, duration_s: 2.0}
  - name: baseline_dup_reorder_combined
    cooldown: false
    dup_obs:
      - {start_s: 5.0, duration_s: 2.0}
    dup_action:
      - {start_s: 8.0, duration_s: 2.0}
    reorder_obs:
      - {start_s: 12.0, duration_s: 2.0}
    reorder_action:
      - {start_s: 15.0, duration_s: 2.0}
